---
discord_webhook_id: "{{ vault_discord_webhook_id }}"
discord_webhook_token: "{{ vault_discord_webhook_token }}"
# Compose stacks are auto-discovered per host via `docker compose ls`. Stacks listed
# here are NOT restarted/recreated — their images are still pulled, and if updates are
# found a Discord notice flags them for manual reconstitution. Critically, list the
# automation controller's own stack (e.g. Semaphore) here: restarting the thing running
# the playbook mid-run would break the run.
compose_exclude:
  - /opt/stacks/semaphore
aur_helper: yay
# When false, hosts are patched but never rebooted (reboot-required signals
# persist, so a later run with reboot_enabled=true will reboot them).
reboot_enabled: true
# Per-host override: when true, the host is patched but never rebooted and no
# reboot-pending notice is sent (e.g. workstations in the devices_net group,
# set automatically in Archlinux.yml). Defaults false; most hosts reboot.
reboot_skip: false
