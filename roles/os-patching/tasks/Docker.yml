---
- name: "Discover running Docker Compose projects on {{ inventory_hostname }}"
  ansible.builtin.command: docker compose ls --format json
  register: compose_ls
  changed_when: false
  check_mode: false

- name: "Resolve compose project directories on {{ inventory_hostname }}"
  ansible.builtin.set_fact:
    compose_targets: >-
      {{ compose_ls.stdout | from_json
         | map(attribute='ConfigFiles')
         | map('regex_replace', ',.*$', '')
         | map('dirname')
         | unique
         | difference(compose_exclude) }}

- name: "Update Images and Restart Required Containers"
  community.docker.docker_compose_v2:
    project_src: "{{ item }}"
    pull: always
    recreate: auto
    state: present
  register: docker_v2_results
  loop: "{{ compose_targets }}"
  # Don't let one broken stack abort the rest of the host's Docker phase;
  # failures are collected and reported below.
  ignore_errors: true

- name: "Prune Unused Container Images"
  community.docker.docker_prune:
    images: true
  when: docker_v2_results.changed

- name: "Notify Discord: Docker images updated"
  ansible.builtin.include_tasks: notify.yml
  vars:
    embed_title: "👍 Docker Images Updated on {{ inventory_hostname }} 👍"
    embed_color: 1127128
  when: docker_v2_results.changed

- name: "Notify Discord: compose stacks failed to update"
  ansible.builtin.include_tasks: notify.yml
  vars:
    embed_title: "⚠️ Compose Stacks Failed to Update on {{ inventory_hostname }} ⚠️"
    embed_color: 15158332
    embed_description: >-
      These stacks failed and were skipped:
      {{ docker_v2_results.results | default([])
         | selectattr('failed', 'defined') | selectattr('failed')
         | map(attribute='item') | join(', ') }}
  when: >-
    docker_v2_results.results | default([])
    | selectattr('failed', 'defined') | selectattr('failed') | list | length > 0
