---
- name: "Discover and partition compose stacks on {{ inventory_hostname }}"
  ansible.builtin.include_tasks: discover_compose.yml

- name: "Update Images and Restart Required Containers"
  community.docker.docker_compose_v2:
    project_src: "{{ item }}"
    pull: always
    recreate: auto
    state: present
  register: docker_v2_results
  loop: "{{ compose_targets }}"
  # Don't let one broken stack abort the rest of the host's Docker phase;
  # failures are collected and reported below.
  ignore_errors: true

- name: "Prune Unused Container Images"
  community.docker.docker_prune:
    images: true
  when: docker_v2_results.changed

- name: "Notify Discord: Docker images updated"
  ansible.builtin.include_tasks: notify.yml
  vars:
    embed_title: "👍 Docker Images Updated on {{ inventory_hostname }} 👍"
    embed_color: 1127128
  when: docker_v2_results.changed

- name: "Notify Discord: compose stacks failed to update"
  ansible.builtin.include_tasks: notify.yml
  vars:
    embed_title: "⚠️ Compose Stacks Failed to Update on {{ inventory_hostname }} ⚠️"
    embed_color: 15158332
    embed_description: >-
      These stacks failed and were skipped:
      {{ docker_v2_results.results | default([])
         | selectattr('failed', 'defined') | selectattr('failed')
         | map(attribute='item') | join(', ') }}
  when: >-
    docker_v2_results.results | default([])
    | selectattr('failed', 'defined') | selectattr('failed') | list | length > 0

- name: "Pull Images for Excluded Stacks (no recreate) on {{ inventory_hostname }}"
  community.docker.docker_compose_v2_pull:
    project_src: "{{ item }}"
    policy: always
  loop: "{{ compose_pull_only }}"
  ignore_errors: true

# Report any stack now running an outdated image — typically the excluded
# pull-only stacks (pulled but not restarted), or a managed stack whose recreate
# failed above. Drift-based so it keeps reminding until the stack is restarted.
- name: "Report stacks running outdated images on {{ inventory_hostname }}"
  ansible.builtin.include_tasks: check_drift.yml
  vars:
    drift_projects: "{{ compose_discovered }}"
